<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ GoldenMenu - منيو المطعم الفاخر</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>🍽️ GoldenMenu</h1>
                <p>منيو المطعم الفاخر</p>
            </div>
            <div class="header-actions">
                <button class="inquiry-btn" onclick="openInquiry()">
                    <i>💬</i> استفسار
                </button>
                <button class="cart-btn" onclick="toggleCart()">
                    <i>🛒</i> العربة (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Special Offers Section -->
            <section class="offers-section" id="offers-section">
                <h2>🎉 العروض الخاصة</h2>
                <div class="offers-grid" id="offers-grid">
                    <!-- Offers will be populated by JavaScript -->
                </div>
            </section>

            <!-- Menu Section -->
            <section class="menu-section">
                <h2>📋 قائمة الطعام</h2>

                <!-- Navigation -->
                <nav class="nav">
                    <div class="container">
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-category="all">الكل</button>
                            <button class="filter-btn" data-category="grills">مشويات</button>
                            <button class="filter-btn" data-category="salads">سلطات</button>
                            <button class="filter-btn" data-category="drinks">مشروبات</button>
                            <button class="filter-btn" data-category="desserts">حلويات</button>
                            <button class="filter-btn" data-category="offers">العروض</button>
                        </div>
                        <div class="price-filter">
                            <label for="price-range">فلترة حسب السعر:</label>
                            <input type="range" id="price-range" min="0" max="500" value="500">
                            <span id="price-value">500 جنيه</span>
                        </div>
                    </div>
                </nav>

                <div class="menu-grid" id="menu-grid">
                    <!-- Menu items will be populated by JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>🛒 عربة الطلب</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items will be populated by JavaScript -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <strong>الإجمالي: <span id="cart-total">0</span> جنيه</strong>
            </div>
            <button class="order-btn" onclick="sendOrder()">إكمال الطلب عبر واتساب</button>
            <button class="clear-cart-btn" onclick="clearCart()">حذف الكل</button>
        </div>
    </div>

    <!-- Item Details Modal -->
    <div class="modal" id="item-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-body" id="modal-body">
                <!-- Item details will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmation-modal">
        <div class="modal-content">
            <div class="modal-body" id="confirmation-modal-body">
                <h3 id="confirmation-message"></h3>
                <div class="confirmation-buttons">
                    <button id="confirm-btn" class="btn-confirm">نعم</button>
                    <button id="cancel-btn" class="btn-cancel">لا</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
